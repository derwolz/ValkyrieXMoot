server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net 'unsafe-inline'; connect-src 'self' https://unpkg.com https://cdn.jsdelivr.net; img-src 'self' data: blob:; media-src 'self' blob:; worker-src blob:;" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location ~* \.js$ {
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Music folders: nginx auto-indexes the directory contents as JSON so the
    # radio can discover whichever files the user drops in.
    location ~ ^/data/music/[^/]+/?$ {
        autoindex on;
        autoindex_format json;
        autoindex_exact_size off;
    }

    location ~* \.(html|css|js)$ {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
