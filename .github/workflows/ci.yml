name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run smoke

  build:
    name: Docker build + scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --build-arg BUILD_TIME=$(date -u +%Y%m%d-%H%M%S) \
            -t valkyriexmoot:${{ github.sha }} .

      - name: Scan for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: valkyriexmoot:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
